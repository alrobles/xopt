name: Probe Tests

on:
  push:
    branches: [ main, master, claude/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  probe-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
       - name: Install ucminfcpp Package
        run: |
          install.packages('remotes')
          # Install from GitHub (Modify with actual repository)
          remotes::install_github('author/ucminfcpp')
          remotes::install_github('author/xad')

      - name: Install R dependencies
        run: |
          install.packages(c("Rcpp", "devtools"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Build and install package
        run: |
          R CMD build .
          R CMD INSTALL xopt_*.tar.gz
        shell: bash

      - name: Run probe tests
        run: |
          Rscript -e 'library(xopt); cat("Running XAD + xtensor probe:\n"); probe_xad_xtensor()'
        shell: bash
